<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CHANNEL 1 - PRO LIVE SPORTS</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&family=Orbitron:wght@700&display=swap');
        body { background-color: #05070a; color: #f1f5f9; font-family: 'Inter', sans-serif; }
        .glass { background: rgba(15, 23, 42, 0.9); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.08); }
        .live-dot { animation: pulse 1.5s infinite; }
        @keyframes pulse { 0% { opacity: 1; transform: scale(1); } 50% { opacity: 0.3; transform: scale(0.8); } 100% { opacity: 1; transform: scale(1); } }
        #player-overlay { display: none; background: rgba(0,0,0,0.98); z-index: 1000; }
        .player-box { width: 98%; max-width: 1100px; aspect-ratio: 16/9; box-shadow: 0 0 50px rgba(59, 130, 246, 0.2); }
        .custom-scrollbar::-webkit-scrollbar { width: 5px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #1e293b; border-radius: 10px; }
        .logo-font { font-family: 'Orbitron', sans-serif; }
        
        /* Time Box Clickable Style */
        .time-trigger { 
            cursor: pointer; 
            transition: all 0.3s ease;
        }
        .time-trigger:hover { 
            background: rgba(59, 130, 246, 0.2);
            color: #3b82f6;
            transform: scale(1.05);
        }
    </style>
</head>
<body class="pb-10 custom-scrollbar">

    <!-- Navbar -->
    <nav class="glass sticky top-0 z-50 border-b border-slate-800 px-6 py-4">
        <div class="max-w-7xl mx-auto flex justify-between items-center">
            <div class="text-2xl font-black italic text-blue-500 tracking-tighter uppercase logo-font">Channel<span class="text-white">1</span></div>
            <div class="flex items-center gap-4">
                <div id="update-time" class="text-[9px] text-slate-500 font-mono tracking-widest uppercase hidden md:block"></div>
                <button onclick="fetchMatches()" class="text-slate-400 hover:text-white transition"><i class="fas fa-sync-alt text-sm"></i></button>
            </div>
        </div>
    </nav>

    <div class="max-w-7xl mx-auto px-4 mt-8">
        <!-- Featured Section -->
        <div id="featured-section" style="display:none;">
            <h2 class="text-lg font-black mb-6 text-blue-500 flex items-center tracking-widest uppercase">
                <span class="h-2 w-8 bg-blue-600 mr-3 rounded-full"></span> Top Fixtures
            </h2>
            <div id="featured-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6 mb-12"></div>
        </div>

        <!-- All Matches List -->
        <h2 class="text-lg font-black mb-6 text-slate-400 flex items-center tracking-widest uppercase">
            <span class="h-2 w-8 bg-slate-700 mr-3 rounded-full"></span> Live Schedule
        </h2>
        <div id="matches-list" class="space-y-3">
            <div id="initial-loading" class="text-center py-20 text-slate-600 animate-pulse uppercase tracking-widest text-xs">Connecting to Secure Server...</div>
        </div>
    </div>

    <!-- Player Modal -->
    <div id="player-overlay" class="fixed inset-0 flex items-center justify-center p-2">
        <div class="player-box relative bg-black rounded-2xl overflow-hidden border border-slate-800 shadow-2xl">
            <!-- Close & Unlock Buttons -->
            <div class="absolute top-3 left-3 z-50 flex gap-2">
                <button onclick="closeStream()" class="bg-red-600 hover:bg-red-700 text-white px-4 py-2 rounded-xl text-[10px] font-black uppercase transition flex items-center gap-2">
                    <i class="fas fa-times"></i> Close
                </button>
                <button id="unlock-btn" class="bg-blue-600 hover:bg-blue-700 text-white px-4 py-2 rounded-xl text-[10px] font-black uppercase transition flex items-center gap-2">
                    <i class="fas fa-external-link-alt"></i> Unlock Player / Open Direct
                </button>
            </div>

            <!-- Loader inside Modal -->
            <div id="stream-loader" class="absolute inset-0 flex flex-col items-center justify-center bg-slate-950 z-40">
                <div class="w-10 h-10 border-2 border-blue-500 border-t-transparent rounded-full animate-spin"></div>
                <p class="mt-4 text-[9px] text-slate-500 font-bold uppercase tracking-[0.3em]">Bypassing Ads & Syncing Stream</p>
            </div>

            <iframe id="main-iframe" src="" allowfullscreen frameborder="0" scrolling="no" class="w-full h-full"></iframe>
        </div>
    </div>

    <script>
        async function fetchMatches() {
            try {
                const res = await fetch('matches.json?v=' + Date.now());
                const data = await res.json();
                
                const featuredSection = document.getElementById('featured-section');
                const featuredGrid = document.getElementById('featured-grid');
                const matchesList = document.getElementById('matches-list');
                const updateTime = document.getElementById('update-time');
                
                updateTime.innerText = "LAST SYNC: " + new Date().toLocaleTimeString();

                if (!data || data.length === 0) {
                    matchesList.innerHTML = `<div class="text-center py-20 text-slate-700 font-bold uppercase tracking-widest text-xs">No active matches found.</div>`;
                    return;
                }

                // Featured Section Logic
                const featuredMatches = data.filter(m => m.is_featured === true);
                if (featuredMatches.length > 0) {
                    featuredSection.style.display = 'block';
                    featuredGrid.innerHTML = featuredMatches.map(m => `
                        <div class="glass rounded-[2rem] p-6 border-b-4 border-b-blue-600 transition hover:bg-slate-900/50">
                            <div class="flex justify-between text-[9px] font-black text-blue-400 mb-6 uppercase tracking-[0.1em]">
                                <span>${m.league}</span>
                                <span class="flex items-center text-red-500 font-bold">
                                    <span class="h-1.5 w-1.5 bg-red-500 rounded-full mr-2 live-dot"></span> LIVE
                                </span>
                            </div>
                            <div class="flex items-center justify-between mb-8">
                                <div class="text-center w-[40%]">
                                    <img src="${m.home_logo}" class="w-12 h-12 mx-auto mb-3 object-contain drop-shadow-lg" onerror="this.src='https://cdn-icons-png.flaticon.com/512/53/53254.png'">
                                    <div class="text-[10px] font-black uppercase tracking-tighter truncate">${m.home_team}</div>
                                </div>
                                <div class="text-xs font-black italic text-slate-700 uppercase cursor-pointer hover:text-blue-500 transition" onclick="openStream('${m.link}')">VS</div>
                                <div class="text-center w-[40%]">
                                    <img src="${m.away_logo}" class="w-12 h-12 mx-auto mb-3 object-contain drop-shadow-lg" onerror="this.src='https://cdn-icons-png.flaticon.com/512/53/53254.png'">
                                    <div class="text-[10px] font-black uppercase tracking-tighter truncate">${m.away_team}</div>
                                </div>
                            </div>
                            <button onclick="openStream('${m.link}')" class="w-full bg-blue-600 hover:bg-blue-500 py-3 rounded-2xl font-black text-[10px] tracking-[0.2em] uppercase transition shadow-lg shadow-blue-900/20">
                                <i class="fas fa-play-circle mr-2"></i> Watch Live
                            </button>
                        </div>
                    `).join('');
                }

                // List View Logic (အလယ်က အချိန်ကိုနှိပ်မှ ဗီဒီယိုပွင့်မည်)
                matchesList.innerHTML = data.map(m => `
                    <div class="glass rounded-2xl p-4 flex flex-wrap justify-between items-center gap-4 border-l-2 ${m.is_live ? 'border-l-blue-500' : 'border-l-slate-800'} transition">
                        <div class="flex-1 min-w-[200px]">
                            <div class="flex items-center gap-3 mb-1">
                                <span class="text-[8px] bg-blue-600/10 text-blue-500 px-2 py-0.5 rounded font-black uppercase tracking-widest">${m.league}</span>
                                ${m.is_live ? '<span class="text-[9px] text-red-500 font-black animate-pulse uppercase tracking-tighter">● Live Now</span>' : ''}
                            </div>
                            <div class="flex items-center gap-2">
                                <span class="font-bold text-sm tracking-tight text-slate-200 w-[40%] truncate text-right">${m.home_team}</span>
                                
                                <!-- ဤနေရာသည် အလယ်က အချိန် Box ဖြစ်သည် -->
                                <span class="time-trigger bg-slate-800/50 px-3 py-1 rounded-lg text-[10px] font-mono text-blue-400 font-bold uppercase border border-slate-700 mx-2" 
                                      onclick="openStream('${m.link}')" title="Click to Watch Live">
                                    ${m.time}
                                </span>
                                
                                <span class="font-bold text-sm tracking-tight text-slate-200 w-[40%] truncate text-left">${m.away_team}</span>
                            </div>
                        </div>
                        <div class="flex items-center gap-4">
                            <button onclick="openStream('${m.link}')" class="bg-blue-600 hover:bg-blue-700 text-white px-5 py-2 rounded-xl text-[9px] font-black uppercase tracking-widest transition shadow-lg shadow-blue-900/20">
                                WATCH
                            </button>
                        </div>
                    </div>
                `).join('');

            } catch (e) { 
                document.getElementById('matches-list').innerHTML = `<div class="text-center py-20 text-red-500 uppercase text-xs font-bold">Error loading match data.</div>`;
            }
        }

        function openStream(url) {
            const overlay = document.getElementById('player-overlay');
            const iframe = document.getElementById('main-iframe');
            const loader = document.getElementById('stream-loader');
            const unlockBtn = document.getElementById('unlock-btn');
            
            overlay.style.display = 'flex';
            loader.style.display = 'flex';
            
            unlockBtn.onclick = () => {
                window.open(url, '_blank');
            };

            iframe.src = url;
            iframe.onload = () => { 
                setTimeout(() => { loader.style.display = 'none'; }, 1000);
            };
        }

        function closeStream() {
            const overlay = document.getElementById('player-overlay');
            const iframe = document.getElementById('main-iframe');
            overlay.style.display = 'none';
            iframe.src = ""; 
        }

        window.addEventListener('keydown', (e) => { if(e.key === 'Escape') closeStream(); });

        fetchMatches();
        setInterval(fetchMatches, 60000);
    </script>
</body>
</html>
