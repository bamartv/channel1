name: Global Football Data Update

on:
  schedule:
    # ၃၀ မိနစ်တစ်ကြိမ် အလိုအလျောက် Update လုပ်ပေးမည် (0, 30 မိနစ်တိုင်း)
    - cron: '*/30 * * * *'
  workflow_dispatch: # လက်နဲ့ ကိုယ်တိုင်နှိပ်ပြီး Run ချင်ရင်လည်း ရသည်

jobs:
  update-data:
    runs-on: ubuntu-latest
    
    # Repository ထဲကို file ပြန်ရေးနိုင်ဖို့ Permission ပေးခြင်း
    permissions:
      contents: write

    steps:
      # ၁။ Repository ထဲက code တွေကို ဆွဲယူခြင်း
      - name: Checkout Repository
        uses: actions/checkout@v4

      # ၂။ Python setup လုပ်ခြင်း
      - name: Set up Python 3.9
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      # ၃။ လိုအပ်သော Libraries များသွင်းခြင်း
      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests beautifulsoup4

      # ၄။ Scraper ကို Run ပြီး matches.json ထုတ်ခြင်း
      - name: Run Football Scraper
        run: python scraper.py

      # ၅။ ပြောင်းလဲသွားသော matches.json ကို GitHub ထဲ ပြန်သိမ်းခြင်း (Commit & Push)
      - name: Commit and Push Changes
        run: |
          git config --global user.name "Channel1-Bot"
          git config --global user.email "actions@github.com"
          git add matches.json
          
          # အပြောင်းအလဲရှိမှသာ Commit လုပ်မည်၊ မရှိလျှင် ကျော်သွားမည်
          git diff --quiet && git diff --staged --quiet || (git commit -m "Auto-update match data: $(date)" && git push)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
